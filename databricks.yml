bundle:
  name: racetrac-agent-demo

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name for demo assets.
    default: reggie_pierce
  schema:
    description: Demo schema under the target catalog.
    default: racetrac_agent_demo

targets:
  dev:
    default: true
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: reggie_pierce
      schema: racetrac_agent_demo

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: reggie_pierce
      schema: racetrac_agent_demo
