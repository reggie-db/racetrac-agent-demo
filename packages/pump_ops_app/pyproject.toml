[build-system]
requires = ["uv_build>=0.9.6,<0.10.0"]
build-backend = "uv_build"

[project]
name = "pump-ops-app"
version = "0.0.1+gce7f286"
requires-python = ">=3.12,<3.13"
description = "Reflex UI demo for RaceTrac pump operations agent bricks."
dependencies = [
    "common @ file://${PROJECT_ROOT}/../common",
    "genie-space @ file://${PROJECT_ROOT}/../genie_space",
    "info-extractor @ file://${PROJECT_ROOT}/../info_extractor",
    "knowledge-assistant @ file://${PROJECT_ROOT}/../knowledge_assistant",
    "supervisor @ file://${PROJECT_ROOT}/../supervisor",
    "dbx-reflex @ git+https://github.com/reggie-db/reggie-bricks-py.git#subdirectory=dbx-reflex",
    "reflex>=0.7.0",
]

[tool.uv.sources]
[tool.uv.sources.supervisor]
workspace = true

[tool.uv.sources.knowledge-assistant]
workspace = true

[tool.uv.sources.info-extractor]
workspace = true

[tool.uv.sources.genie-space]
workspace = true

[tool.uv.sources.common]
workspace = true
